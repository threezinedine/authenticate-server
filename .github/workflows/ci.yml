name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "server/.python-version"
      - name: Install dependencies
        run: |
          cd server
          uv sync --all-extras --dev
      - name: Test backend with pytest
        run: |
          uv run helper.py "test server"

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./server/frontend
        run: npm ci
      - name: Run Jest tests
        run: uv run helper.py "test components"

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install NPM dependencies
        run: npm ci
      - name: Setup Database
        run: |
          cd server
          uv sync --all-extras --dev
      - name: Start Auth Server
        run: |
          # Use helper to run daemon
          # Replace with docker if preferred
          uv run helper.py "run server" &
          sleep 5
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          wait-on: 'http://localhost:8000'
          browser: chrome
