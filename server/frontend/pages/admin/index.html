{% extends "base.html" %}

{% block title %}Dashboard | NTT{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/components/toast/style.css">
<link rel="stylesheet" href="/static/components/button/style.css">
<link rel="stylesheet" href="/static/components/sidemenu-item/style.css">
<link rel="stylesheet" href="/static/components/sidemenu/style.css">
<link rel="stylesheet" href="/static/components/modal/style.css">
<link rel="stylesheet" href="/static/pages/admin/style.css">
{% endblock %}

{% block content %}
<div class="admin-layout" id="adminLayout">
    <!-- Left Sidebar Mounting Point -->
    <div id="adminSidebarContainer" style="display: contents;"></div>

    <!-- Main Content Area -->
    <main class="admin-main">
        <!-- Topbar -->
        <header class="admin-topbar">
            <div class="admin-topbar__inner">
                Topbar Region
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="admin-content">
            <div class="admin-content__placeholder">
                Main Content Region (Charts, Metrics, Data Lists)
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block page_scripts %}
<script type="module" src="/static/pages/admin/script.js"></script>
{% endblock %}
