{% extends "base.html" %}

{% block title %}Dashboard | NTT{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/components/toast/style.css">
<link rel="stylesheet" href="/static/pages/admin/style.css">
{% endblock %}

{% block content %}
<div class="admin-layout" id="adminLayout">
    <!-- Sliding Sidebar -->
    <nav class="admin-sidebar" id="adminSidebar">
        <div class="admin-sidebar__panel">
            <div class="admin-sidebar__logo">
                <img src="/static/assets/ntt-logo.png" alt="NTT Logo" />
            </div>
            <div class="admin-sidebar__nav">
                Sidebar Region
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="admin-main">
        <!-- Topbar -->
        <header class="admin-topbar">
            <div class="admin-topbar__inner">
                Topbar Region
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="admin-content">
            <div class="admin-content__placeholder">
                Main Content Region (Charts, Metrics, Data Lists)
            </div>
        </div>
    </main>
</div>
{% endblock %}

{% block page_scripts %}
<script type="module" src="/static/pages/admin/script.js"></script>
{% endblock %}
