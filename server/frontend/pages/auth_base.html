{% extends "base.html" %}

{% block head %}
<!-- Base Auth Components (Loaded universally for Login, Register, Forgot Password, etc.) -->
<link rel="stylesheet" href="/static/components/auth-layout/style.css">
<link rel="stylesheet" href="/static/components/glass-panel/style.css">
<link rel="stylesheet" href="/static/components/title-glow/style.css">
<link rel="stylesheet" href="/static/components/input-group/style.css">
<!-- Page-specific Auth Head Injections -->
{% block auth_head %}{% endblock %}
{% endblock %}

{% block content %}
<main class="auth-layout min-vh-100">
    <div class="auth-layout__particles"></div>

    <!-- Centered Flexible Wrapper Holding Logo & Form -->
    <div class="auth-layout__wrapper">

        <!-- Left Side: Logo Element -->
        <div class="auth-logo-large">
            <img src="/static/assets/ntt-logo.png" alt="NTT Logo" />
        </div>

        <!-- Right Side: Form Container -->
        <div class="auth-layout__content">
            <div class="glass-panel glass-panel--3d">
                <!-- Sub-pages will inject their local forms here -->
                {% block auth_form %}{% endblock %}
            </div>
        </div>

    </div>
</main>
{% endblock %}
