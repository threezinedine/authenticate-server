{% extends "auth_base.html" %}

{% block title %}Sign In - NTT Auth{% endblock %}

{% block auth_head %}
<!-- Component CSS Loading -->
<link rel="stylesheet" href="/static/components/button/style.css">
<link rel="stylesheet" href="/static/components/input-group/style.css">
<link rel="stylesheet" href="/static/components/divider/style.css">
<link rel="stylesheet" href="/static/components/auth-form/style.css">
<!-- Page Specific CSS -->
<link rel="stylesheet" href="/static/pages/login/style.css">
{% endblock %}

{% block auth_form %}
<div class="test-render">
    <h1 class="title-glow" style="margin-bottom: var(--space-xs); text-align: center;">SIGN IN</h1>
    <p class="text-muted" style="text-align: center; margin-bottom: var(--space-xl);">Access your centralized NTT
        Account</p>

    <!-- Using our built component logic, Javascript will inject the form into this container -->
    <div id="login-form-container"></div>

    <div style="text-align: center; margin-top: var(--space-lg);">
        <a href="/register" class="text-link">Don't have an account? Sign Up</a>
    </div>
</div>
{% endblock %}

{% block page_scripts %}
<!-- Load Component Logic -->
<!-- Note: In a real production JS environment we would bundle these, 
     but for this pure JS architecture we'll load them as modules -->
<script type="module" src="/static/pages/login/script.js"></script>
{% endblock %}
